name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint:html | tee htmlhint-report.txt
      - run: npm run lint:css | tee stylelint-report.txt
      - run: npm run lint:js | tee eslint-report.txt
      - run: npm run links
      - uses: actions/upload-artifact@v4
        with:
          name: lint-and-links
          path: |
            htmlhint-report.txt
            stylelint-report.txt
            eslint-report.txt
            link-report.json

  lighthouse:
    if: github.event_name == 'pull_request'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  deploy:
    if: github.event_name == 'push'
    needs: lint
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run css:build
      - name: Ping IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "www.vahorizon.site",
              "key": "a3f8b2c4d1e9f7a5b6c8d2e3f4a1b5c9",
              "keyLocation": "https://www.vahorizon.site/a3f8b2c4d1e9f7a5b6c8d2e3f4a1b5c9.txt",
              "urlList": [
                "https://www.vahorizon.site/",
                "https://www.vahorizon.site/services/cold-calling/",
                "https://www.vahorizon.site/crm/",
                "https://www.vahorizon.site/industries/real-estate/",
                "https://www.vahorizon.site/case-studies/",
                "https://www.vahorizon.site/blog/"
              ]
            }' || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
