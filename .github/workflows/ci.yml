name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm run lint:html | tee htmlhint-report.txt
      - run: npm run lint:css | tee stylelint-report.txt
      - run: npm run lint:js | tee eslint-report.txt
      - run: npm run links
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lint-and-links
          path: |
            htmlhint-report.txt
            stylelint-report.txt
            eslint-report.txt
            link-report.json

  lighthouse:
    if: github.event_name == 'pull_request'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: treosh/lighthouse-ci-action@0d716cfc9995b090bb89fe8f531fc3c133ec89ef # v11
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  deploy:
    if: github.event_name == 'push'
    needs: lint
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Ping IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "www.vahorizon.site",
              "key": "a3f8b2c4d1e9f7a5b6c8d2e3f4a1b5c9",
              "keyLocation": "https://www.vahorizon.site/a3f8b2c4d1e9f7a5b6c8d2e3f4a1b5c9.txt",
              "urlList": [
                "https://www.vahorizon.site/",
                "https://www.vahorizon.site/services/cold-calling/",
                "https://www.vahorizon.site/crm/",
                "https://www.vahorizon.site/industries/real-estate/",
                "https://www.vahorizon.site/case-studies/",
                "https://www.vahorizon.site/blog/"
              ]
            }' || true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
